name: بناء تطبيق APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 استنساخ المشروع
      uses: actions/checkout@v4

    - name: 🐍 إعداد Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'  # حفظ حزم pip في الذاكرة المؤقتة

    - name: ⚙️ تثبيت التبعيات النظامي��
      run: |
        sudo apt update
        sudo apt install -y python3-pip git zip unzip openjdk-17-jdk

    - name: ⚙️ تثبيت حزم Python
      run: pip install buildozer cython

    - name: 🏗️ بناء تطبيق APK
      run: buildozer android debug

    - name: 📦 تحميل ملف APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
